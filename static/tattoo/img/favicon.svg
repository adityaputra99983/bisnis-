<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Bali Tattoo">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d68a"/>
      <stop offset="45%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#b8962f"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0d68a" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#d4af37" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#b8962f" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="shine" cx="0.32" cy="0.30" r="0.45">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="13" fill="url(#bgGrad)"/>
  <rect x="1" y="1" width="62" height="62" rx="12" fill="none" stroke="url(#ringGrad)" stroke-width="1.2"/>

  <g filter="url(#softGlow)">
    <path d="M32 9 C32 9, 16 25, 16 38.5 C16 47, 23 53.5, 32 53.5 C41 53.5, 48 47, 48 38.5 C48 25, 32 9, 32 9 Z" fill="url(#goldGrad)"/>
  </g>

  <ellipse cx="25" cy="30" rx="4.5" ry="6.5" fill="url(#shine)"/>
  <circle cx="24.5" cy="20" r="1.1" fill="#fff" opacity="0.7"/>

  <ellipse cx="32" cy="58" rx="2.2" ry="0.9" fill="url(#goldGrad)" opacity="0.55"/>
</svg>
