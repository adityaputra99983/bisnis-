<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="ink1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.08"/>
      <stop offset="60%" stop-color="#d4af37" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ink2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.06"/>
      <stop offset="50%" stop-color="#d4af37" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="splatter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.12"/>
      <stop offset="40%" stop-color="#d4af37" stop-opacity="0.06"/>
      <stop offset="70%" stop-color="#d4af37" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <!-- Main splatter center -->
  <circle cx="400" cy="400" r="300" fill="url(#splatter)" filter="url(#blur1)"/>
  <circle cx="400" cy="400" r="200" fill="url(#ink1)" filter="url(#blur1)"/>
  <circle cx="400" cy="400" r="120" fill="url(#ink2)" filter="url(#blur2)"/>
  <!-- Splatter droplets -->
  <circle cx="180" cy="250" r="40" fill="url(#ink1)" filter="url(#blur1)"/>
  <circle cx="620" cy="300" r="35" fill="url(#ink1)" filter="url(#blur1)"/>
  <circle cx="250" cy="580" r="45" fill="url(#ink1)" filter="url(#blur1)"/>
  <circle cx="600" cy="550" r="30" fill="url(#ink1)" filter="url(#blur1)"/>
  <circle cx="300" cy="200" r="25" fill="url(#ink1)" filter="url(#blur1)"/>
  <circle cx="550" cy="200" r="20" fill="url(#ink1)" filter="url(#blur1)"/>
  <circle cx="200" cy="450" r="28" fill="url(#ink1)" filter="url(#blur1)"/>
  <circle cx="550" cy="480" r="22" fill="url(#ink1)" filter="url(#blur1)"/>
  <!-- Tiny droplets -->
  <circle cx="150" cy="320" r="8" fill="#d4af37" opacity="0.04"/>
  <circle cx="680" cy="380" r="6" fill="#d4af37" opacity="0.04"/>
  <circle cx="320" cy="150" r="10" fill="#d4af37" opacity="0.03"/>
  <circle cx="500" cy="650" r="7" fill="#d4af37" opacity="0.03"/>
  <circle cx="130" cy="500" r="5" fill="#d4af37" opacity="0.04"/>
  <circle cx="650" cy="180" r="9" fill="#d4af37" opacity="0.03"/>
  <circle cx="450" cy="160" r="6" fill="#d4af37" opacity="0.04"/>
  <circle cx="170" cy="150" r="4" fill="#d4af37" opacity="0.03"/>
  <circle cx="660" cy="600" r="8" fill="#d4af37" opacity="0.03"/>
  <circle cx="350" cy="680" r="5" fill="#d4af37" opacity="0.04"/>
</svg>
