<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <style>
      .orn-fill { fill: #d4af37; opacity: 0.04; stroke: #d4af37; stroke-width: 0.8; stroke-opacity: 0.1; }
      .orn-line { stroke: #d4af37; stroke-width: 1.2; fill: none; opacity: 0.1; }
      .orn-line-thin { stroke: #d4af37; stroke-width: 0.6; fill: none; opacity: 0.07; }
      .orn-dot { fill: #d4af37; opacity: 0.07; }
    </style>
  </defs>

  <!-- Neo-traditional ornamental corner frame + center compass -->

  <!-- Top-left corner ornament -->
  <g transform="translate(0,0)">
    <path class="orn-fill" d="M0,0 Q50,20 80,80 Q20,50 0,0Z"/>
    <path class="orn-fill" d="M0,0 Q20,50 80,80 Q50,20 0,0Z"/>
    <path class="orn-line" d="M10,10 Q40,30 70,70 Q30,40 10,10"/>
    <path class="orn-line-thin" d="M20,20 C40,30 50,50 60,60 C50,40 40,30 20,20"/>
    <!-- Flourish -->
    <path class="orn-line" d="M0,0 C30,-10 60,10 80,40 C100,70 80,100 60,110 C40,120 20,100 30,80 C40,60 60,60 70,70 C80,80 70,100 50,95 C40,92 35,85 40,75"/>
    <!-- Decorative dots -->
    <circle cx="25" cy="15" r="2" class="orn-dot"/>
    <circle cx="15" cy="25" r="1.5" class="orn-dot"/>
    <circle cx="40" cy="20" r="1.5" class="orn-dot"/>
    <circle cx="20" cy="40" r="1.5" class="orn-dot"/>
    <circle cx="50" cy="40" r="2" class="orn-dot"/>
    <circle cx="40" cy="50" r="1.5" class="orn-dot"/>
  </g>

  <!-- Top-right corner ornament -->
  <g transform="translate(800,0) scale(-1,1)">
    <path class="orn-fill" d="M0,0 Q50,20 80,80 Q20,50 0,0Z"/>
    <path class="orn-fill" d="M0,0 Q20,50 80,80 Q50,20 0,0Z"/>
    <path class="orn-line" d="M10,10 Q40,30 70,70 Q30,40 10,10"/>
    <path class="orn-line-thin" d="M20,20 C40,30 50,50 60,60 C50,40 40,30 20,20"/>
    <path class="orn-line" d="M0,0 C30,-10 60,10 80,40 C100,70 80,100 60,110 C40,120 20,100 30,80 C40,60 60,60 70,70 C80,80 70,100 50,95 C40,92 35,85 40,75"/>
    <circle cx="25" cy="15" r="2" class="orn-dot"/>
    <circle cx="15" cy="25" r="1.5" class="orn-dot"/>
    <circle cx="40" cy="20" r="1.5" class="orn-dot"/>
    <circle cx="20" cy="40" r="1.5" class="orn-dot"/>
    <circle cx="50" cy="40" r="2" class="orn-dot"/>
    <circle cx="40" cy="50" r="1.5" class="orn-dot"/>
  </g>

  <!-- Bottom-left corner ornament -->
  <g transform="translate(0,800) scale(1,-1)">
    <path class="orn-fill" d="M0,0 Q50,20 80,80 Q20,50 0,0Z"/>
    <path class="orn-fill" d="M0,0 Q20,50 80,80 Q50,20 0,0Z"/>
    <path class="orn-line" d="M10,10 Q40,30 70,70 Q30,40 10,10"/>
    <path class="orn-line-thin" d="M20,20 C40,30 50,50 60,60 C50,40 40,30 20,20"/>
    <path class="orn-line" d="M0,0 C30,-10 60,10 80,40 C100,70 80,100 60,110 C40,120 20,100 30,80 C40,60 60,60 70,70 C80,80 70,100 50,95 C40,92 35,85 40,75"/>
    <circle cx="25" cy="15" r="2" class="orn-dot"/>
    <circle cx="15" cy="25" r="1.5" class="orn-dot"/>
    <circle cx="40" cy="20" r="1.5" class="orn-dot"/>
    <circle cx="20" cy="40" r="1.5" class="orn-dot"/>
    <circle cx="50" cy="40" r="2" class="orn-dot"/>
    <circle cx="40" cy="50" r="1.5" class="orn-dot"/>
  </g>

  <!-- Bottom-right corner ornament -->
  <g transform="translate(800,800) scale(-1,-1)">
    <path class="orn-fill" d="M0,0 Q50,20 80,80 Q20,50 0,0Z"/>
    <path class="orn-fill" d="M0,0 Q20,50 80,80 Q50,20 0,0Z"/>
    <path class="orn-line" d="M10,10 Q40,30 70,70 Q30,40 10,10"/>
    <path class="orn-line-thin" d="M20,20 C40,30 50,50 60,60 C50,40 40,30 20,20"/>
    <path class="orn-line" d="M0,0 C30,-10 60,10 80,40 C100,70 80,100 60,110 C40,120 20,100 30,80 C40,60 60,60 70,70 C80,80 70,100 50,95 C40,92 35,85 40,75"/>
    <circle cx="25" cy="15" r="2" class="orn-dot"/>
    <circle cx="15" cy="25" r="1.5" class="orn-dot"/>
    <circle cx="40" cy="20" r="1.5" class="orn-dot"/>
    <circle cx="20" cy="40" r="1.5" class="orn-dot"/>
    <circle cx="50" cy="40" r="2" class="orn-dot"/>
    <circle cx="40" cy="50" r="1.5" class="orn-dot"/>
  </g>

  <!-- Compass rose center -->
  <g transform="translate(400,400)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="120" class="orn-line"/>
    <circle cx="0" cy="0" r="115" class="orn-line-thin"/>
    <circle cx="0" cy="0" r="105" class="orn-line"/>
    <circle cx="0" cy="0" r="100" class="orn-line-thin"/>

    <!-- Cardinal points -->
    <polygon class="orn-fill" points="0,-180 12,-40 0,-30 -12,-40"/>
    <polygon class="orn-fill" points="0,180 12,40 0,30 -12,40"/>
    <polygon class="orn-fill" points="-180,0 -40,12 -30,0 -40,-12"/>
    <polygon class="orn-fill" points="180,0 40,12 30,0 40,-12"/>
    <path class="orn-line" d="M0,-180 L12,-40 L0,-30 L-12,-40 Z"/>
    <path class="orn-line" d="M0,180 L12,40 L0,30 L-12,40 Z"/>
    <path class="orn-line" d="M-180,0 L-40,12 L-30,0 L-40,-12 Z"/>
    <path class="orn-line" d="M180,0 L40,12 L30,0 L40,-12 Z"/>

    <!-- Intercardinal points -->
    <polygon class="orn-fill" points="-120,-120 -25,-25 -15,-30 -20,-40"/>
    <polygon class="orn-fill" points="120,-120 25,-25 15,-30 20,-40"/>
    <polygon class="orn-fill" points="-120,120 -25,25 -15,30 -20,40"/>
    <polygon class="orn-fill" points="120,120 25,25 15,30 20,40"/>
    <path class="orn-line" d="M-120,-120 L-25,-25 L-15,-30 L-20,-40 Z"/>
    <path class="orn-line" d="M120,-120 L25,-25 L15,-30 L20,-40 Z"/>
    <path class="orn-line" d="M-120,120 L-25,25 L-15,30 L-20,40 Z"/>
    <path class="orn-line" d="M120,120 L25,25 L15,30 L20,40 Z"/>

    <!-- Inner compass star -->
    <polygon class="orn-fill" points="0,-60 8,-15 0,-10 -8,-15"/>
    <polygon class="orn-fill" points="0,60 8,15 0,10 -8,15"/>
    <polygon class="orn-fill" points="-60,0 -15,8 -10,0 -15,-8"/>
    <polygon class="orn-fill" points="60,0 15,8 10,0 15,-8"/>
    <path class="orn-line" d="M0,-60 L8,-15 L0,-10 L-8,-15 Z"/>
    <path class="orn-line" d="M0,60 L8,15 L0,10 L-8,15 Z"/>
    <path class="orn-line" d="M-60,0 L-15,8 L-10,0 L-15,-8 Z"/>
    <path class="orn-line" d="M60,0 L15,8 L10,0 L15,-8 Z"/>

    <!-- Center -->
    <circle cx="0" cy="0" r="8" class="orn-fill"/>
    <circle cx="0" cy="0" r="8" class="orn-line"/>
    <circle cx="0" cy="0" r="3" class="orn-dot"/>

    <!-- Decorative outer dots -->
    <circle cx="0" cy="-130" r="2" class="orn-dot"/>
    <circle cx="0" cy="130" r="2" class="orn-dot"/>
    <circle cx="-130" cy="0" r="2" class="orn-dot"/>
    <circle cx="130" cy="0" r="2" class="orn-dot"/>
    <circle cx="-92" cy="-92" r="2" class="orn-dot"/>
    <circle cx="92" cy="-92" r="2" class="orn-dot"/>
    <circle cx="-92" cy="92" r="2" class="orn-dot"/>
    <circle cx="92" cy="92" r="2" class="orn-dot"/>
  </g>

  <!-- Connecting lines between corners and center -->
  <path class="orn-line-thin" d="M80,80 Q200,150 295,295 Q150,200 80,80"/>
  <path class="orn-line-thin" d="M720,80 Q600,150 505,295 Q650,200 720,80"/>
  <path class="orn-line-thin" d="M80,720 Q200,650 295,505 Q150,600 80,720"/>
  <path class="orn-line-thin" d="M720,720 Q600,650 505,505 Q650,600 720,720"/>
</svg>
