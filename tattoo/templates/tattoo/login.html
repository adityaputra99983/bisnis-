{% extends 'tattoo/base.html' %}
{% load static %}

{% block title %}Login - Bali Tattoo Studio{% endblock %}

{% block content %}
<section class="py-5 mt-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5" data-aos="fade-up">
                <div class="auth-card">
                    <h2 class="text-center mb-1">Login</h2>
                    <p class="text-center text-muted mb-4">Masuk ke akun kamu</p>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" name="username" class="form-control" placeholder="Masukkan username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" placeholder="Masukkan password" required>
                        </div>
                        <button type="submit" class="btn btn-gold w-100">Login</button>
                    </form>
                    <p class="text-center mt-4 text-muted">
                        Belum punya akun? <a href="{% url 'register' %}" class="text-gold">Daftar</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
