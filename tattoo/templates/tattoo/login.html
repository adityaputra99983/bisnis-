<!DOCTYPE html>
{% load static %}
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Bali Tattoo Studio</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', sans-serif; background: #050505; color: #e0d5c0; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 0; padding: 20px; }
  .auth-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(201,161,59,0.2); border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; backdrop-filter: blur(10px); }
  .auth-card h2 { font-family: 'Playfair Display', serif; color: #c9a13b; }
  .form-control { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #e0d5c0; padding: 12px 16px; border-radius: 8px; }
  .form-control:focus { background: rgba(255,255,255,0.08); border-color: #c9a13b; box-shadow: 0 0 0 2px rgba(201,161,59,0.2); color: #e0d5c0; }
  .form-control::placeholder { color: rgba(255,255,255,0.3); }
  .form-label { color: #a09880; font-weight: 500; font-size: 0.9rem; }
  .btn-gold { background: linear-gradient(135deg, #c9a13b, #a8842e); color: #050505; border: none; padding: 12px; border-radius: 8px; font-weight: 600; transition: 0.3s; }
  .btn-gold:hover { background: linear-gradient(135deg, #dbb34a, #b89434); color: #050505; }
  .text-gold { color: #c9a13b; text-decoration: none; }
  .text-gold:hover { color: #dbb34a; }
  .alert { border-radius: 8px; }
  .brand { font-family: 'Playfair Display', serif; color: #c9a13b; font-size: 1.5rem; margin-bottom: 1.5rem; text-align: center; }
  .brand i { margin-right: 8px; }
</style>
</head>
<body>
  <div class="auth-card">
    <div class="brand"><i class="bi bi-droplet"></i> Bali Tattoo</div>
    <h2 class="text-center mb-1">Login</h2>
    <p class="text-center text-muted mb-4">Masuk ke akun kamu</p>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show small" role="alert">
          {{ message }}
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Masukkan username" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Masukkan password" required>
      </div>
      <button type="submit" class="btn btn-gold w-100">Login</button>
    </form>
    <p class="text-center mt-4 text-muted small">
      Belum punya akun? <a href="{% url 'register' %}" class="text-gold">Daftar</a>
    </p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
