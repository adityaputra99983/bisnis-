{% extends 'tattoo/base.html' %}
{% load static %}

{% block title %}Login | Bali Ink Hub{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="brand"><i class="bi bi-droplet"></i> Bali Ink Hub</div>
        <h2 class="text-center mb-1">Login</h2>
        <p class="text-center text-muted mb-4">Masuk ke akun kamu</p>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Masukkan username" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Masukkan password" required>
            </div>
            <button type="submit" class="btn-gold w-100">Login</button>
        </form>
        <p class="text-center mt-4 text-muted small">
            Belum punya akun? <a href="{% url 'register' %}" class="text-gold fw-semibold text-decoration-none">Daftar</a>
        </p>
    </div>
</div>
{% endblock %}
